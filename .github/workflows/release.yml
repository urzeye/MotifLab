name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=Manual-Trig" >> $GITHUB_OUTPUT
          fi

      - name: Extract Commit History
        id: get_commits
        run: |
          # 尝试获取上一个 Tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Changelog between $PREV_TAG and HEAD"
          if [ -z "$PREV_TAG" ]; then
            # 如果没有上一个tag，提取最近10条提交
            git log -n 10 --pretty=format:"- %s" > changelog.txt
          else
            # 提取两个Tag之间的所有提交记录
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" > changelog.txt
          fi
          # 将多行文本安全地装入 Github Output
          {
            echo 'notes<<EOF'
            echo ""
            cat changelog.txt
            echo ""
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: MotifLab ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: false
          body: |
            ## 🚀 MotifLab Release ${{ steps.get_version.outputs.VERSION }}

            ### ✨ What's New | 本次更新内容

            ${{ steps.get_commits.outputs.notes }}

            ---

            ### 🐳 一键部署 | Docker Deployment

            如果您不想进行繁琐的环境配置，我们极度推荐您使用 Docker 一键起服务：
            ```bash
            # 下载下方最新的源码包解压后进入目录运行
            docker-compose up -d
            ```
            *部署完毕后，访问 `http://localhost:5173` 即可开始使用！*

            ---

            *如需深入开发或通过源码本地裸机运行服务器，请详参下方代码包内的 `README.md`。*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
