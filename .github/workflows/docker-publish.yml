name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本（格式：v1.2.3 或 1.2.3）"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name and version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ ! "${RAW_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "版本格式错误: ${RAW_VERSION}"
            echo "请使用 vX.Y.Z 或 X.Y.Z"
            exit 1
          fi

          VERSION="${RAW_VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME}"

          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "full_tag=${IMAGE}:${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.resolve.outputs.full_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.resolve.outputs.version }}
