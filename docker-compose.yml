services:
  motiflab:
    image: ghcr.io/urzeye/motiflab:0.3.4
    container_name: motiflab
    ports:
      - "12398:12398"
    volumes:
      # 持久化数据目录
      - ./history:/app/history
      - ./output:/app/output
      # 可选：挂载自定义配置文件
      # - ./.env:/app/.env
      # - ./search_providers.yaml:/app/search_providers.yaml
      # - ./text_providers.yaml:/app/text_providers.yaml
      # - ./image_providers.yaml:/app/image_providers.yaml
    restart: unless-stopped
